<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冠丞3C | 優質嚴選 測試優良</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 電腦版 (全螢幕時) 依舊保留滑鼠懸浮即顯示的效果 */
        @media (min-width: 640px) {
            .dropdown-group:hover .dropdown-menu {
                opacity: 1;
                transform: translateY(0) scale(1);
                pointer-events: auto;
            }
        }

        /* 透過 JavaScript 動態控制顯示的類別（同時支援手機點擊與電腦控制） */
        .dropdown-menu.is-active {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }
    </style>
</head>
<body class="bg-[#fafafa] text-[#1d1d1f] font-sans antialiased min-h-screen flex flex-col" onclick="closeAllDropdowns()">

    <header class="bg-white/80 backdrop-blur-md border-b border-gray-100 sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-6 py-4 flex flex-col lg:flex-row justify-between items-center gap-4">
            <div class="text-center lg:text-left cursor-pointer" onclick="resetFilters()">
                <h1 class="text-xl font-bold tracking-wider text-gray-900">冠丞3C</h1>
                <p class="text-xs text-gray-400 mt-0.5">專業嚴選 · 功能皆經嚴格測試</p>
            </div>
            
            <div class="flex flex-col sm:flex-row items-center gap-3 w-full lg:w-auto justify-center lg:justify-end">
                
                <div class="relative w-full sm:w-48">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400 text-xs">
                        🔍
                    </span>
                    <input 
                        type="text" 
                        id="search-input" 
                        oninput="handleSearchInput()"
                        placeholder="搜尋商品..." 
                        class="w-full bg-gray-100 border border-transparent text-gray-800 placeholder-gray-400 text-xs rounded-xl pl-9 pr-8 py-2.5 font-medium focus:outline-none focus:bg-white focus:border-gray-200 transition-all"
                    >
                    <button 
                        id="clear-search-btn" 
                        onclick="clearSearch()" 
                        class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-gray-600 text-sm hidden"
                    >
                        ×
                    </button>
                </div>

                <div class="flex bg-gray-100 p-1 rounded-xl gap-1 w-full sm:w-auto justify-center relative">
                    <button onclick="filterProducts('all', event)" id="btn-all" class="px-4 py-2 text-xs rounded-lg bg-white text-gray-900 font-medium shadow-sm transition-all flex-1 sm:flex-none">
                        全部商品
                    </button>
                    
                    <div class="dropdown-group relative flex-1 sm:flex-none">
                        <button onclick="toggleDropdown('office-menu', event)" id="btn-office" class="w-full px-4 py-2 text-xs rounded-lg text-gray-500 hover:text-gray-900 font-medium transition-all flex items-center justify-center gap-0.5">
                            <span>文書商務</span> <span class="text-[9px] text-gray-400">▼</span>
                        </button>
                        <div id="office-menu" class="dropdown-menu absolute left-1/2 -translate-x-1/2 top-full pt-1.5 w-36 opacity-0 scale-95 pointer-events-none transition-all duration-200 z-50">
                            <div class="bg-white/95 backdrop-blur-md border border-gray-100 rounded-2xl p-1.5 shadow-xl flex flex-col gap-0.5">
                                <button onclick="selectOfficeSize('all', event)" class="w-full text-left px-3 py-2 text-xs rounded-xl hover:bg-gray-50 font-medium text-gray-700 hover:text-gray-900 transition">所有尺寸</button>
                                <button onclick="selectOfficeSize('13', event)" class="w-full text-left px-3 py-2 text-xs rounded-xl hover:bg-gray-50 font-medium text-gray-500 hover:text-gray-900 transition">13 吋以下</button>
                                <button onclick="selectOfficeSize('14', event)" class="w-full text-left px-3 py-2 text-xs rounded-xl hover:bg-gray-50 font-medium text-gray-500 hover:text-gray-900 transition">14 吋</button>
                                <button onclick="selectOfficeSize('15', event)" class="w-full text-left px-3 py-2 text-xs rounded-xl hover:bg-gray-50 font-medium text-gray-500 hover:text-gray-900 transition">15 吋以上</button>
                            </div>
                        </div>
                    </div>

                    <div class="dropdown-group relative flex-1 sm:flex-none">
                        <button onclick="toggleDropdown('gaming-menu', event)" id="btn-gaming" class="w-full px-4 py-2 text-xs rounded-lg text-gray-500 hover:text-gray-900 font-medium transition-all flex items-center justify-center gap-0.5">
                            <span>電競遊戲</span> <span class="text-[9px] text-gray-400">▼</span>
                        </button>
                        <div id="gaming-menu" class="dropdown-menu absolute left-1/2 -translate-x-1/2 top-full pt-1.5 w-36 opacity-0 scale-95 pointer-events-none transition-all duration-200 z-50">
                            <div class="bg-white/95 backdrop-blur-md border border-gray-100 rounded-2xl p-1.5 shadow-xl flex flex-col gap-0.5">
                                <button onclick="selectGamingSize('all', event)" class="w-full text-left px-3 py-2 text-xs rounded-xl hover:bg-gray-50 font-medium text-gray-700 hover:text-gray-900 transition">所有尺寸</button>
                                <button onclick="selectGamingSize('14', event)" class="w-full text-left px-3 py-2 text-xs rounded-xl hover:bg-gray-50 font-medium text-gray-500 hover:text-gray-900 transition">14 吋以下</button>
                                <button onclick="selectGamingSize('15', event)" class="w-full text-left px-3 py-2 text-xs rounded-xl hover:bg-gray-50 font-medium text-gray-500 hover:text-gray-900 transition">15.6 吋</button>
                                <button onclick="selectGamingSize('16', event)" class="w-full text-left px-3 py-2 text-xs rounded-xl hover:bg-gray-50 font-medium text-gray-500 hover:text-gray-900 transition">16 吋以上</button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="flex items-center gap-3 w-full sm:w-auto">
                    <div class="relative flex-grow sm:w-36">
                        <select id="price-sort" onchange="handleSortChange()" class="w-full bg-gray-100 border border-transparent text-gray-600 text-xs rounded-xl px-3 py-2.5 font-medium cursor-pointer focus:outline-none focus:bg-white focus:border-gray-200 transition-all appearance-none">
                            <option value="default">預設排序</option>
                            <option value="price-asc">價位：低 ➔ 高</option>
                            <option value="price-desc">價位：高 ➔ 低</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-400 text-[10px]">
                            ▼
                        </div>
                    </div>

                    <button onclick="scrollToAbout()" class="text-xs text-gray-500 hover:text-gray-900 font-medium transition-all border-l border-gray-200 pl-3 whitespace-nowrap flex-shrink-0 py-2">
                        關於我們
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-12 flex-grow w-full">
        
        <div id="filter-indicator-bar" class="mb-6 flex flex-wrap gap-2 items-center text-xs hidden">
            <span class="text-gray-400 font-medium">當前篩選：</span>
            <span id="indicator-badge" class="bg-blue-50 text-blue-600 font-semibold px-3 py-1 rounded-full border border-blue-100 flex items-center gap-1.5">
                <span></span>
                <button onclick="resetSubFilters()" class="hover:text-blue-800 text-sm font-bold">×</button>
            </span>
        </div>

        <div id="loading-view" class="text-center py-20 text-sm text-gray-400">
            <div class="animate-spin inline-block w-6 h-6 border-[3px] border-current border-t-transparent text-gray-400 rounded-full mb-2" role="status" aria-label="loading"></div>
            <p>正在從雲端同步最新庫存...</p>
        </div>

        <div id="product-list-view" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 hidden">
        </div>

        <div id="product-detail-view" class="hidden">
            <button onclick="showListView()" class="mb-8 text-sm text-gray-500 hover:text-gray-900 transition flex items-center gap-2 group">
                <span class="transform group-hover:-translate-x-1 transition-transform">←</span> 返回商品列表
            </button>
            
            <div class="bg-white rounded-3xl border border-gray-100 shadow-sm p-6 md:p-10 grid grid-cols-1 lg:grid-cols-2 gap-12">
                
                <div class="grid grid-cols-1 md:grid-cols-5 gap-4 items-start md:h-[450px]">
                    <div id="detail-thumbs" class="order-2 md:order-1 flex md:flex-col gap-3 overflow-x-auto md:overflow-x-visible md:overflow-y-auto max-h-full scrollbar-thin pb-2 md:pb-0 pr-0 md:pr-1">
                    </div>
                    <div class
