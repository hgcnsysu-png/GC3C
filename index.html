<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冠丞3C | 優質嚴選 測試優良</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#fafafa] text-[#1d1d1f] font-sans antialiased min-h-screen flex flex-col">

    <header class="bg-white/80 backdrop-blur-md border-b border-gray-100 sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="text-center sm:text-left cursor-pointer" onclick="filterProducts('all')">
                <h1 class="text-xl font-bold tracking-wider text-gray-900">冠丞3C</h1>
                <p class="text-xs text-gray-400 mt-0.5">專業嚴選 · 功能皆經嚴格測試</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex bg-gray-100 p-1 rounded-xl gap-1">
                    <button onclick="filterProducts('all')" id="btn-all" class="px-4 py-2 text-xs rounded-lg bg-white text-gray-900 font-medium shadow-sm transition-all">全部商品</button>
                    <button onclick="filterProducts('office')" id="btn-office" class="px-4 py-2 text-xs rounded-lg text-gray-500 hover:text-gray-900 font-medium transition-all">文書商務</button>
                    <button onclick="filterProducts('gaming')" id="btn-gaming" class="px-4 py-2 text-xs rounded-lg text-gray-500 hover:text-gray-900 font-medium transition-all">電競遊戲</button>
                </div>
                <button onclick="scrollToAbout()" class="text-xs text-gray-500 hover:text-gray-900 font-medium transition-all border-l border-gray-200 pl-4 hidden sm:block">關於我們</button>
                
                <button onclick="toggleCartModal()" class="relative p-2.5 bg-gray-900 text-white rounded-xl hover:bg-gray-800 transition shadow-sm flex items-center justify-center gap-1.5 group">
                    <span class="text-sm">🛒</span>
                    <span class="text-xs font-bold hidden sm:inline">詢問車</span>
                    <span id="cart-count" class="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[10px] font-extrabold px-1.5 min-w-[18px] h-[18px] rounded-full flex items-center justify-center border-2 border-white">0</span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-12 flex-grow w-full">
        
        <div id="loading-view" class="text-center py-20 text-sm text-gray-400">
            <div class="animate-spin inline-block w-6 h-6 border-[3px] border-current border-t-transparent text-gray-400 rounded-full mb-2" role="status" aria-label="loading"></div>
            <p>正在從雲端同步最新庫存...</p>
        </div>

        <div id="product-list-view" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 hidden">
        </div>

        <div id="product-detail-view" class="hidden">
            <button onclick="showListView()" class="mb-8 text-sm text-gray-500 hover:text-gray-900 transition flex items-center gap-2 group">
                <span class="transform group-hover:-translate-x-1 transition-transform">←</span> 返回商品列表
            </button>
            
            <div class="bg-white rounded-3xl border border-gray-100 shadow-sm p-6 md:p-10 grid grid-cols-1 lg:grid-cols-2 gap-12">
                
                <div class="grid grid-cols-1 md:grid-cols-5 gap-4 items-start md:h-[450px]">
                    <div id="detail-thumbs" class="order-2 md:order-1 flex md:flex-col gap-3 overflow-x-auto md:overflow-x-visible md:overflow-y-auto max-h-full scrollbar-thin pb-2 md:pb-0 pr-0 md:pr-1">
                        </div>
                    <div class="order-1 md:order-2 md:col-span-4 bg-gray-50 rounded-2xl overflow-hidden shadow-sm h-full flex items-center justify-center border border-gray-100 aspect-video md:aspect-auto">
                        <img id="detail-main-img" src="" class="w-full h-full object-cover transition-all duration-300 cursor-zoom-in" onclick="openLightboxFromDetail()">
                    </div>
                </div>

                <div class="flex flex-col justify-between">
                    <div>
                        <span id="detail-category" class="inline-block bg-gray-100 text-gray-500 text-xs font-semibold px-2.5 py-1 rounded-full mb-3 uppercase tracking-wider"></span>
                        <h2 id="detail-title" class="text-2xl md:text-3xl font-bold tracking-tight text-gray-900 mb-4"></h2>
                        <div id="detail-specs" class="flex flex-wrap gap-2 mb-6"></div>
                        <div class="border-t border-gray-100 pt-6 mt-6">
                            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">商品機況與配件</h3>
                            <p id="detail-condition" class="text-gray-600 leading-relaxed text-sm whitespace-pre-line"></p>
                        </div>
                    </div>
                    <div class="border-t border-gray-100 pt-6 mt-8 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                        <div>
                            <p class="text-xs text-gray-400 font-medium">直購價</p>
                            <span id="detail-price" class="text-3xl font-extrabold text-gray-900 tracking-tight">
